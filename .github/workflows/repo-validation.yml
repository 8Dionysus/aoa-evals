name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Repo Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check repository skill home
        uses: 8Dionysus/aoa-skills/.github/actions/home-skill-port@bef949a8324fd3579569c329b9e6c74a2cacc4a5

      - name: Check repo-local KAG index family
        uses: 8Dionysus/aoa-kag/.github/actions/repo-local-kag-index@b28f64a497fd440dd58cbaae90d655da46224d8c
        with:
          history-ref: ${{ github.event.pull_request.base.sha || github.event.before || format('{0}^', github.sha) }}
          event-history-ref: ${{ github.event.pull_request.base.sha || github.event.before || format('{0}^', github.sha) }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Checkout abyss-machine verifier
        run: git clone --depth 1 https://github.com/8Dionysus/abyss-machine "$RUNNER_TEMP/abyss-machine"

      - name: Run release audit
        env:
          ABYSS_MACHINE_REPO_ROOT: ${{ runner.temp }}/abyss-machine
        run: python scripts/release_check.py
