name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      AOA_TECHNIQUES_ROOT: ${{ github.workspace }}/.deps/aoa-techniques
      AOA_SKILLS_ROOT: ${{ github.workspace }}/.deps/aoa-skills
      AOA_AGENTS_ROOT: ${{ github.workspace }}/.deps/aoa-agents
      AOA_PLAYBOOKS_ROOT: ${{ github.workspace }}/.deps/aoa-playbooks
      AOA_MEMO_ROOT: ${{ github.workspace }}/.deps/aoa-memo
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkout aoa-techniques
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-techniques
          ref: c23e549feebf1d13b89294c9f1a273893e797ca4
          path: .deps/aoa-techniques

      - name: Checkout aoa-skills
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-skills
          ref: 79c6811a049c41eba73f3f60a393e1611e505d96
          path: .deps/aoa-skills

      - name: Checkout aoa-agents
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-agents
          ref: cea2a7e4c87df18c92207bacd5dfa8c22e9789c6
          path: .deps/aoa-agents

      - name: Checkout aoa-playbooks
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-playbooks
          ref: 5279e78821b5e6bc06b0036c3898cd58bc37ed2c
          path: .deps/aoa-playbooks

      - name: Checkout aoa-memo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-memo
          ref: 798c5d5e1fc74de788b4b9e9f6a6bc7c4c2865fb
          path: .deps/aoa-memo

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Check generated surfaces
        run: python scripts/build_catalog.py --check

      - name: Run eval validator
        run: python scripts/validate_repo.py

      - name: Run tests
        run: python -m pytest -q
