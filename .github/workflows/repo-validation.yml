name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Checkout aoa-agents
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-agents
          ref: 51e075040762b5b4b1f7fe4df7c865b069071f56
          path: .deps/aoa-agents

      - name: Checkout aoa-playbooks
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-playbooks
          ref: 7bf84149e67d72831e7d9f100f2a877a9c434d14
          path: .deps/aoa-playbooks

      - name: Checkout aoa-memo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: 8Dionysus/aoa-memo
          ref: e199463e97c4b67a8ebf3aa5217e4e190c0570c8
          path: .deps/aoa-memo

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run eval validator
        env:
          AOA_AGENTS_ROOT: ${{ github.workspace }}/.deps/aoa-agents
          AOA_PLAYBOOKS_ROOT: ${{ github.workspace }}/.deps/aoa-playbooks
          AOA_MEMO_ROOT: ${{ github.workspace }}/.deps/aoa-memo
        run: python scripts/validate_repo.py
