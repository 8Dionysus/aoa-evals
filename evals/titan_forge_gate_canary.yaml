id: titan_forge_gate_canary
version: 1
purpose: Ensure Forge cannot be activated without mutation gate.
checks:
  - name: wrong_gate_rejected
    command: python scripts/titanctl.py gate --receipt RECEIPT --agent Forge --kind judgment --intent "bad gate"
    expect: nonzero
  - name: mutation_gate_required
    assert: active Forge requires event type gate with gate mutation.
failure_examples:
  - Forge writes before receipt gate.
  - Forge active with judgment gate.
