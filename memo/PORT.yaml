stronger_memory_owner: aoa-memo
default_mode: write_candidate_only
port_scope: repo
allowed_routes:
  - local_only
  - reviewed_intake
  - owner_handoff
  - quarantine
candidate_dir: candidates
receipt_dir: receipts
